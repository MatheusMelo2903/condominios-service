<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Gestão de Condomínios</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --azul: #2D9CDB;
  --azul-esc: #1A6FA3;
  --azul-cl: #E8F5FF;
  --cinza-esc: #2C2C2C;
  --cinza: #4A4A4A;
  --cinza-cl: #F5F7FA;
  --borda: #E2E8F0;
  --verde: #27AE60;
  --verde-bg: #EDFBF3;
  --amarelo: #D4880A;
  --amarelo-bg: #FFF9ED;
  --vermelho: #C0392B;
  --vermelho-bg: #FEF2F2;
  --branco: #FFFFFF;
  --texto: #1A1A2E;
  --muted: #718096;
  --sombra: 0 2px 10px rgba(0,0,0,0.08);
  --sombra-m: 0 4px 20px rgba(0,0,0,0.12);
}

body {
  font-family: 'Inter', sans-serif;
  background: #F0F4F8;
  color: var(--texto);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: var(--cinza-esc);
  min-height: 100vh;
  position: fixed;
  left: 0; top: 0;
  display: flex;
  flex-direction: column;
  z-index: 100;
}

.sidebar-logo {
  padding: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.sidebar-logo img {
  width: 100%;
  max-width: 160px;
  filter: brightness(0) invert(1);
}

.sidebar-section {
  padding: 16px 12px 8px;
  font-size: 10px;
  font-weight: 700;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

.cond-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 12px 12px;
}

.cond-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 4px;
  transition: all 0.15s;
  color: rgba(255,255,255,0.65);
  font-size: 13px;
}

.cond-item:hover { background: rgba(255,255,255,0.08); color: white; }
.cond-item.active { background: var(--azul); color: white; }

.cond-avatar {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
}

.cond-item.active .cond-avatar { background: rgba(255,255,255,0.2); }

.cond-name { font-weight: 500; flex: 1; }
.cond-status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.25);
  flex-shrink: 0;
}
.cond-item.active .cond-status-dot { background: #5DFDCB; }

.btn-novo-cond {
  margin: 12px;
  padding: 10px;
  background: rgba(45,156,219,0.2);
  border: 1.5px dashed rgba(45,156,219,0.5);
  border-radius: 8px;
  color: var(--azul);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.btn-novo-cond:hover { background: rgba(45,156,219,0.3); }

/* MAIN */
.main {
  margin-left: 260px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* TOPBAR */
.topbar {
  background: white;
  border-bottom: 1px solid var(--borda);
  padding: 0 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-title {
  font-family: 'Sora', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--texto);
}

.topbar-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 1px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.tag-sindico {
  background: var(--azul-cl);
  color: var(--azul-esc);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.tag-data {
  font-size: 12px;
  color: var(--muted);
}

/* TABS */
.tabs-bar {
  background: white;
  border-bottom: 1px solid var(--borda);
  padding: 0 28px;
  display: flex;
  gap: 0;
  overflow-x: auto;
}

.tab-btn {
  padding: 13px 18px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
}

.tab-btn:hover { color: var(--texto); }
.tab-btn.active { color: var(--azul); border-bottom-color: var(--azul); font-weight: 600; }

.tab-badge {
  background: var(--azul-cl);
  color: var(--azul);
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
}

/* CONTENT */
.content { padding: 24px 28px; }

/* CARDS STATS */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}

.stat-card {
  background: white;
  border-radius: 12px;
  padding: 18px;
  box-shadow: var(--sombra);
  border-top: 3px solid var(--borda);
}
.stat-card.verm { border-top-color: var(--vermelho); }
.stat-card.amar { border-top-color: #F6AB2F; }
.stat-card.verd { border-top-color: var(--verde); }
.stat-card.azul { border-top-color: var(--azul); }

.stat-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-num { font-size: 34px; font-weight: 300; margin: 6px 0 2px; }
.stat-sub { font-size: 11px; color: var(--muted); }

/* PROGRESS */
.progress-section {
  background: white;
  border-radius: 12px;
  padding: 18px 20px;
  box-shadow: var(--sombra);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.progress-bar-wrap { flex: 1; }
.progress-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.progress-track { height: 8px; background: var(--borda); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--azul), var(--verde)); border-radius: 4px; transition: width 0.6s; }

/* PANEL */
.panel { display: none; }
.panel.active { display: block; }

/* SECTION HEADER */
.sec-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.sec-title { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 600; color: var(--texto); }
.sec-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* TABLE */
.table-card {
  background: white;
  border-radius: 12px;
  box-shadow: var(--sombra);
  overflow: hidden;
  margin-bottom: 20px;
}

table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--cinza-esc); }
thead th {
  padding: 11px 16px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
tbody tr { border-bottom: 1px solid var(--borda); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--cinza-cl); }
tbody td { padding: 12px 16px; font-size: 13px; vertical-align: middle; }
td.nome { font-weight: 600; }

/* BADGES */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.b-verde { background: var(--verde-bg); color: var(--verde); }
.b-amar  { background: var(--amarelo-bg); color: var(--amarelo); }
.b-verm  { background: var(--vermelho-bg); color: var(--vermelho); }
.b-azul  { background: var(--azul-cl); color: var(--azul-esc); }
.b-alta  { background: #FEF2F2; color: #C0392B; }
.b-media { background: #FFF9ED; color: #D4880A; }
.b-baixa { background: #EDFBF3; color: #27AE60; }

/* DEMANDA CARDS */
.dem-grid { display: flex; flex-direction: column; gap: 10px; }

.dem-card {
  background: white;
  border-radius: 12px;
  box-shadow: var(--sombra);
  border-left: 4px solid var(--borda);
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.dem-card:hover { box-shadow: var(--sombra-m); }
.dem-card.p-alta  { border-left-color: var(--vermelho); }
.dem-card.p-media { border-left-color: #F6AB2F; }
.dem-card.p-baixa { border-left-color: var(--verde); }
.dem-card.s-conc  { opacity: 0.55; }

.dem-top {
  padding: 14px 18px;
  display: flex; align-items: flex-start; gap: 12px;
  cursor: pointer;
}
.dem-num {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--cinza-cl);
  color: var(--muted);
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.dem-info { flex: 1; }
.dem-titulo { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.dem-sit { font-size: 12px; color: var(--muted); line-height: 1.5; }
.dem-badges { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; }
.dem-meta { text-align: right; font-size: 11px; color: var(--muted); flex-shrink: 0; }
.dem-meta strong { display: block; font-size: 12px; color: var(--texto); margin-bottom: 2px; }

.dem-body {
  border-top: 1px solid var(--borda);
  padding: 14px 18px;
  display: none;
  background: #FAFBFC;
}
.dem-body.open { display: block; }
.dem-body-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.dem-field label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 3px; display: block; }
.dem-field p { font-size: 13px; color: var(--texto); line-height: 1.5; }

/* OBS */
.obs-box {
  background: #FFF9ED;
  border: 1px solid #F6AB2F;
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 12px;
  color: #7A5000;
  margin-bottom: 18px;
  display: flex; gap: 8px; align-items: flex-start;
}

/* TIMELINE */
.tl-wrap {
  background: white;
  border-radius: 12px;
  box-shadow: var(--sombra);
  padding: 20px;
}
.tl-item {
  display: flex; gap: 14px;
  padding: 11px 0;
  border-bottom: 1px solid var(--borda);
}
.tl-item:last-child { border-bottom: none; }
.tl-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--azul);
  flex-shrink: 0; margin-top: 5px;
}
.tl-dot.g { background: var(--verde); }
.tl-dot.a { background: #F6AB2F; }
.tl-content .tl-data { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
.tl-content .tl-txt { font-size: 13px; color: var(--texto); line-height: 1.5; }

/* ASSIN */
.assin-empty {
  background: white;
  border-radius: 12px;
  box-shadow: var(--sombra);
  padding: 40px;
  text-align: center;
  border: 2px dashed var(--borda);
}
.assin-empty .ico { font-size: 40px; margin-bottom: 12px; }
.assin-empty strong { display: block; font-size: 15px; margin-bottom: 6px; }
.assin-empty p { font-size: 13px; color: var(--muted); }

/* EMPTY STATE */
.empty-state {
  background: white;
  border-radius: 12px;
  padding: 60px;
  text-align: center;
  box-shadow: var(--sombra);
}
.empty-state .ico { font-size: 50px; margin-bottom: 16px; }
.empty-state h3 { font-family: 'Sora', sans-serif; font-size: 18px; margin-bottom: 8px; }
.empty-state p { font-size: 13px; color: var(--muted); }

/* LAUDO FULL CARDS */
.laudos-lista { display: flex; flex-direction: column; gap: 12px; }

.laudo-full-card {
  background: white;
  border-radius: 12px;
  box-shadow: var(--sombra);
  border-left: 5px solid var(--borda);
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.laudo-full-card:hover { box-shadow: var(--sombra-m); }
.laudo-full-card.conc { border-left-color: var(--verde); }
.laudo-full-card.and  { border-left-color: #F6AB2F; }
.laudo-full-card.pend { border-left-color: var(--vermelho); }

.laudo-full-top {
  padding: 16px 20px;
  display: flex; align-items: center; gap: 14px;
}

.laudo-full-icon { font-size: 28px; flex-shrink: 0; }

.laudo-full-info { flex: 1; }
.laudo-full-nome { font-size: 14px; font-weight: 600; margin-bottom: 7px; }
.laudo-full-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.lm { font-size: 12px; color: var(--muted); }

.laudo-full-acoes { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

.btn-laudo-upload {
  padding: 8px 14px;
  background: var(--azul);
  color: white;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
.btn-laudo-upload:hover { background: var(--azul-esc); }

.btn-laudo-ver {
  padding: 8px 14px;
  background: var(--verde);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
.btn-laudo-ver:hover { background: #1E8449; }

.btn-laudo-rem {
  padding: 8px 10px;
  background: var(--vermelho-bg);
  color: var(--vermelho);
  border: 1px solid #F5B7B1;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-laudo-rem:hover { background: var(--vermelho); color: white; }

.laudo-pdf-info {
  padding: 10px 20px;
  background: var(--verde-bg);
  border-top: 1px solid #C3E6CB;
  font-size: 12px;
  color: var(--verde);
}

/* PDF VIEWER */
.pdf-viewer-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 300;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.pdf-viewer-overlay.open { display: flex; }

.pdf-viewer-box {
  width: 100%; max-width: 900px;
  height: 90vh;
  background: white;
  border-radius: 12px;
  overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

.pdf-viewer-header {
  padding: 14px 20px;
  background: var(--cinza-esc);
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 14px;
  font-weight: 600;
}

.pdf-close {
  padding: 6px 14px;
  background: rgba(255,255,255,0.15);
  border: none;
  border-radius: 6px;
  color: white;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.pdf-close:hover { background: rgba(255,255,255,0.25); }

/* BTN GERAR */
.btn-gerar {
  padding: 8px 16px;
  background: var(--cinza-esc);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
.btn-gerar:hover { background: #444; }
.btn-gerar:disabled { background: var(--muted); cursor: not-allowed; }

/* FOOTER */
.footer {
  margin-left: 260px;
  border-top: 1px solid var(--borda);
  padding: 14px 28px;
  font-size: 11px;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
  background: white;
}

/* MODAL NOVO COND */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: white;
  border-radius: 16px;
  padding: 28px;
  width: 440px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal-box h3 { font-family: 'Sora', sans-serif; font-size: 16px; margin-bottom: 20px; }
.modal-field { margin-bottom: 14px; }
.modal-field label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 5px; }
.modal-field input {
  width: 100%; padding: 9px 12px;
  border: 1.5px solid var(--borda); border-radius: 8px;
  font-family: 'Inter', sans-serif; font-size: 13px;
  outline: none; transition: border-color 0.15s;
}
.modal-field input:focus { border-color: var(--azul); }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.btn-cancel { padding: 9px 18px; border-radius: 8px; border: 1.5px solid var(--borda); background: white; cursor: pointer; font-size: 13px; font-weight: 600; }
.btn-ok { padding: 9px 18px; border-radius: 8px; border: none; background: var(--azul); color: white; cursor: pointer; font-size: 13px; font-weight: 600; }
</style>
</head>
<body>

<!-- SIDEBAR -->

// ─── UI HELPERS ─────────────────────────────────────────────────────────────

function statusBadge(s) {
  if (s === 'Concluído') return '<span class="badge b-verde">Concluído</span>';
  if (s === 'Em andamento') return '<span class="badge b-amar">Em andamento</span>';
  return '<span class="badge b-verm">Pendente</span>';
}

function prioBadge(p) {
  if (p === 'Alta')  return '<span class="badge b-alta">Alta</span>';
  if (p === 'Média') return '<span class="badge b-media">Média</span>';
  return '<span class="badge b-baixa">Baixa</span>';
}

function cardClass(p) {
  if (p === 'Alta')  return 'p-alta';
  if (p === 'Média') return 'p-media';
  return 'p-baixa';
}

function toggleDem(id) {
  const b = document.getElementById('body-' + id);
  b.classList.toggle('open');
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────

function renderSidebar() {
  const list = document.getElementById('cond-list');
  list.innerHTML = condominios.map(c => {
    const iniciais = c.nome.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    return `<div class="cond-item ${condAtivo === c.id ? 'active':''}" onclick="selecionarCond('${c.id}')">
      <div class="cond-avatar">${iniciais}</div>
      <span class="cond-name">${c.nome}</span>
      <div class="cond-status-dot"></div>
    </div>`;
  }).join('');
}

// ─── SELECIONAR CONDOMÍNIO ────────────────────────────────────────────────────

function selecionarCond(id) {
  condAtivo = id;
  const c = condominios.find(x => x.id === id);
  document.getElementById('top-nome').textContent = c.nome;
  document.getElementById('top-sub').textContent = 'Sistema de Gestão · Virtual Service';
  const tagSind = document.getElementById('top-sindico');
  tagSind.textContent = 'Síndico: ' + c.sindico;
  tagSind.style.display = 'inline';
  document.getElementById('tabs-bar').style.display = 'flex';
  document.getElementById('btn-gerar').style.display = 'inline-block';
  renderSidebar();
  atualizarBadges(c);
  showTab('visao', document.querySelector('.tab-btn'));
}

function atualizarBadges(c) {
  const todasDem = [...(c.prioridades||[]), ...(c.demandas||[])];
  document.getElementById('badge-prio').textContent = (c.prioridades||[]).length;
  document.getElementById('badge-dem').textContent = (c.demandas||[]).length;
}

// ─── TABS ────────────────────────────────────────────────────────────────────

function showTab(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const c = condominios.find(x => x.id === condAtivo);
  const el = document.getElementById('content');

  if (id === 'visao')       el.innerHTML = renderVisao(c);
  if (id === 'prioridades') el.innerHTML = renderDemGrid(c.prioridades || [], 'Prioridades do Síndico ' + c.sindico, 'Itens classificados como urgentes — plano de ação ativo');
  if (id === 'demandas')    el.innerHTML = renderDemGrid(c.demandas || [], 'Todas as Demandas', 'Itens levantados em reunião — ' + c.criadoEm);
  if (id === 'laudos')      el.innerHTML = renderLaudos(c);
  if (id === 'historico')   el.innerHTML = renderHistorico(c);
  if (id === 'assinaturas') el.innerHTML = renderAssinaturas(c);
}

// ─── VISÃO GERAL ─────────────────────────────────────────────────────────────

function renderVisao(c) {
  const todas = [...(c.prioridades||[]), ...(c.demandas||[])];
  const conc = todas.filter(d => d.status === 'Concluído').length;
  const and = todas.filter(d => d.status === 'Em andamento').length;
  const pend = todas.filter(d => d.status === 'Pendente').length;
  const total = todas.length;
  const pct = total ? Math.round(conc / total * 100) : 0;

  const laudosConc = (c.laudos||[]).filter(l => l.status === 'Concluído').length;
  const laudosPend = (c.laudos||[]).filter(l => l.status !== 'Concluído').length;

  let html = `
    <div class="stats-grid">
      <div class="stat-card verm"><div class="stat-label">Pendentes</div><div class="stat-num">${pend}</div><div class="stat-sub">demandas em aberto</div></div>
      <div class="stat-card amar"><div class="stat-label">Em Andamento</div><div class="stat-num">${and}</div><div class="stat-sub">em execução</div></div>
      <div class="stat-card verd"><div class="stat-label">Concluídas</div><div class="stat-num">${conc}</div><div class="stat-sub">de ${total} demandas</div></div>
      <div class="stat-card azul"><div class="stat-label">Laudos</div><div class="stat-num">${laudosConc}</div><div class="stat-sub">${laudosPend} pendente(s)</div></div>
    </div>
    <div class="progress-section">
      <div class="progress-bar-wrap">
        <div class="progress-labels"><span>Progresso geral do plano de ação</span><span>${pct}%</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;

  // Prioridades rápido
  if (c.prioridades && c.prioridades.length) {
    html += `<div class="sec-hdr"><div><div class="sec-title">Resumo das Prioridades</div><div class="sec-sub">Itens definidos como urgentes pelo síndico ${c.sindico}</div></div></div>
    <div class="table-card"><table><thead><tr><th>#</th><th>Demanda</th><th>Prioridade</th><th>Status</th><th>Responsável</th><th>Próxima Ação</th></tr></thead><tbody>`;
    c.prioridades.forEach(d => {
      html += `<tr><td>${d.num}</td><td class="nome">${d.titulo}</td><td>${prioBadge(d.prio)}</td><td>${statusBadge(d.status)}</td><td>${d.resp}</td><td>${d.acao.substring(0,60)}...</td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  // Laudos rápido
  if (c.laudos && c.laudos.length) {
    html += `<div class="sec-hdr" style="margin-top:8px"><div><div class="sec-title">Laudos Técnicos</div></div></div>
    <div class="table-card"><table><thead><tr><th>Laudo</th><th>Status</th><th>Próxima Ação</th><th>Enviado ao Síndico</th></tr></thead><tbody>`;
    c.laudos.forEach(l => {
      const env = l.enviado ? '<span class="badge b-verde">Enviado</span>' : '<span class="badge b-verm">Pendente</span>';
      const prox = l.status === 'Concluído' ? 'Concluído' : (l.status === 'Em andamento' ? 'Aguardando técnico' : 'Agendar vistoria');
      html += `<tr><td class="nome">${l.nome}</td><td>${statusBadge(l.status)}</td><td>${prox}</td><td>${env}</td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  return html;
}

// ─── DEMANDAS GRID ────────────────────────────────────────────────────────────

function renderDemGrid(lista, titulo, sub) {
  let html = `<div class="sec-hdr"><div><div class="sec-title">${titulo}</div><div class="sec-sub">${sub}</div></div></div><div class="dem-grid">`;
  lista.forEach(d => {
    html += `<div class="dem-card ${cardClass(d.prio)} ${d.status==='Concluído'?'s-conc':''}">
      <div class="dem-top" onclick="toggleDem('${d.id}')">
        <div class="dem-num">${d.num}</div>
        <div class="dem-info">
          <div class="dem-titulo">${d.titulo}</div>
          <div class="dem-sit">${d.sit}</div>
          <div class="dem-badges">${prioBadge(d.prio)} ${statusBadge(d.status)}</div>
        </div>
        <div class="dem-meta"><strong>${d.resp}</strong>${d.prazo}</div>
      </div>
      <div class="dem-body" id="body-${d.id}">
        <div class="dem-body-grid">
          <div class="dem-field"><label>Ação Definida</label><p>${d.acao}</p></div>
          <div class="dem-field"><label>Métrica de Conclusão</label><p>${d.metrica}</p></div>
        </div>
      </div>
    </div>`;
  });
  return html + '</div>';
}

// ─── LAUDOS ─────────────────────────────────────────────────────────────────

function renderLaudos(c) {
  let html = `
    <div class="sec-hdr">
      <div><div class="sec-title">Laudos Técnicos</div><div class="sec-sub">Documentação técnica formal — clique em um laudo para anexar o PDF</div></div>
    </div>
    <div class="laudos-lista">`;

  if (!c.laudos || !c.laudos.length) {
    html += `<div class="assin-empty"><div class="ico">📄</div><strong>Nenhum laudo cadastrado</strong><p>Os laudos aparecerão aqui conforme forem cadastrados.</p></div>`;
  } else {
    c.laudos.forEach((l, idx) => {
      const env = l.enviado
        ? '<span class="badge b-verde">✓ Enviado ao síndico</span>'
        : '<span class="badge b-verm">Não enviado</span>';
      const temPdf = l.pdfData ? true : false;
      const statusCls = l.status === 'Concluído' ? 'conc' : l.status === 'Em andamento' ? 'and' : 'pend';

      html += `
        <div class="laudo-full-card ${statusCls}">
          <div class="laudo-full-top">
            <div class="laudo-full-icon">📄</div>
            <div class="laudo-full-info">
              <div class="laudo-full-nome">${l.nome}</div>
              <div class="laudo-full-meta">
                <span>${statusBadge(l.status)}</span>
                <span>${env}</span>
                <span class="lm">🔧 ${l.tecnico}</span>
                <span class="lm">📅 Vistoria: ${l.dataVistoria}</span>
                <span class="lm">📋 Laudo: ${l.dataLaudo}</span>
              </div>
            </div>
            <div class="laudo-full-acoes">
              ${temPdf
                ? `<button class="btn-laudo-ver" onclick="verPdf('${condAtivo}', ${idx})">👁 Ver PDF</button>
                   <button class="btn-laudo-rem" onclick="removerPdf('${condAtivo}', ${idx})">🗑</button>`
                : `<label class="btn-laudo-upload" for="upload-${idx}">📎 Anexar PDF</label>
                   <input type="file" id="upload-${idx}" accept="application/pdf" style="display:none" onchange="uploadPdf(event, '${condAtivo}', ${idx})">`
              }
            </div>
          </div>
          ${temPdf ? `<div class="laudo-pdf-info">📎 PDF anexado — <strong>${l.pdfNome || 'laudo.pdf'}</strong> <span class="lm">(${l.pdfTamanho || ''})</span></div>` : ''}
        </div>`;
    });
  }

  html += `</div>

  <!-- VISUALIZADOR PDF -->
  <div class="pdf-viewer-overlay" id="pdf-overlay" onclick="fecharPdf(event)">
    <div class="pdf-viewer-box">
      <div class="pdf-viewer-header">
        <span id="pdf-title">Laudo</span>
        <button onclick="fecharPdfBtn()" class="pdf-close">✕ Fechar</button>
      </div>
      <iframe id="pdf-frame" src="" style="width:100%;height:calc(100% - 52px);border:none;"></iframe>
    </div>
  </div>`;

  return html;
}

function uploadPdf(event, condId, idx) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const c = condominios.find(x => x.id === condId);
    c.laudos[idx].pdfData = e.target.result;
    c.laudos[idx].pdfNome = file.name;
    c.laudos[idx].pdfTamanho = (file.size / 1024).toFixed(0) + ' KB';
    salvar();
    showTab('laudos', document.querySelector('.tab-btn.active'));
  };
  reader.readAsDataURL(file);
}

function verPdf(condId, idx) {
  const c = condominios.find(x => x.id === condId);
  const l = c.laudos[idx];
  document.getElementById('pdf-title').textContent = l.nome;
  document.getElementById('pdf-frame').src = l.pdfData;
  document.getElementById('pdf-overlay').classList.add('open');
}

function fecharPdf(e) {
  if (e.target === document.getElementById('pdf-overlay')) fecharPdfBtn();
}

function fecharPdfBtn() {
  document.getElementById('pdf-overlay').classList.remove('open');
  document.getElementById('pdf-frame').src = '';
}

function removerPdf(condId, idx) {
  if (!confirm('Remover o PDF anexado?')) return;
  const c = condominios.find(x => x.id === condId);
  delete c.laudos[idx].pdfData;
  delete c.laudos[idx].pdfNome;
  delete c.laudos[idx].pdfTamanho;
  salvar();
  showTab('laudos', document.querySelector('.tab-btn.active'));
}

}

function abrirModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('inp-nome').focus();
}

function fecharModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('inp-nome').value = '';
  document.getElementById('inp-sindico').value = '';
}

function salvarCondominio() {
  const nome = document.getElementById('inp-nome').value.trim();
  const sindico = document.getElementById('inp-sindico').value.trim();
  if (!nome || !sindico) return alert('Preencha todos os campos.');
  const id = nome.toLowerCase().replace(/[^a-z0-9]/g,'').substring(0,20) + Date.now();
  condominios.push({
    id, nome, sindico,
    criadoEm: new Date().toLocaleDateString('pt-BR'),
    laudos: [], historico: [], prioridades: [], demandas: []
  });
  salvar();
  fecharModal();
  renderSidebar();
  selecionarCond(id);
}

// ─── GERAR APRESENTAÇÃO PPTX ─────────────────────────────────────────────────

async function gerarApresentacao() {
  const c = condominios.find(x => x.id === condAtivo);
  if (!c) return;

  const btn = document.getElementById('btn-gerar');
  btn.disabled = true;
  btn.textContent = '⏳ Gerando...';

  try {
    const pres = new PptxGenJS();
    pres.layout = 'LAYOUT_16x9';
    pres.title = 'Plano de Ação — ' + c.nome;
    pres.author = 'Virtual Service';

    // CORES
    const AZUL_ESC = '1A2E4A';
    const AZUL     = '2D9CDB';
    const CINZA    = 'F5F7FA';
    const BRANCO   = 'FFFFFF';
    const VERDE    = '27AE60';
    const VERM     = 'C0392B';
    const AMAR     = 'D4880A';
    const MUTED    = '718096';
    const TEXTO    = '1A1A2E';

    const todas = [...(c.prioridades||[]), ...(c.demandas||[])];
    const conc  = todas.filter(d => d.status === 'Concluído').length;
    const pend  = todas.filter(d => d.status === 'Pendente').length;
    const pct   = todas.length ? Math.round(conc / todas.length * 100) : 0;
    const hoje  = new Date().toLocaleDateString('pt-BR');

    // ── SLIDE 1: CAPA ──────────────────────────────────────────────────────────
    {
      const s = pres.addSlide();
      s.background = { color: AZUL_ESC };

      // Bloco azul lateral
      s.addShape(pres.shapes.RECTANGLE, { x: 0, y: 0, w: 0.18, h: 5.625, fill: { color: AZUL } });

      // Título
      s.addText('PLANO DE AÇÃO', {
        x: 0.5, y: 1.2, w: 9, h: 0.7,
        fontSize: 13, color: AZUL, bold: true, charSpacing: 6
      });
      s.addText(c.nome, {
        x: 0.5, y: 1.9, w: 9, h: 1.2,
        fontSize: 36, color: BRANCO, bold: true
      });
      s.addText('Síndico: ' + c.sindico, {
        x: 0.5, y: 3.1, w: 6, h: 0.45,
        fontSize: 16, color: AZUL
      });
      s.addText('Virtual Service  ·  Condomínio Service  ·  ' + hoje, {
        x: 0.5, y: 4.8, w: 9, h: 0.35,
        fontSize: 11, color: MUTED
      });
    }

    // ── SLIDE 2: RESUMO EXECUTIVO ──────────────────────────────────────────────
    {
      const s = pres.addSlide();
      s.background = { color: BRANCO };

      s.addText('RESUMO EXECUTIVO', {
        x: 0.5, y: 0.35, w: 9, h: 0.4,
        fontSize: 11, color: AZUL, bold: true, charSpacing: 4
      });
      s.addText(c.nome, {
        x: 0.5, y: 0.75, w: 9, h: 0.55,
        fontSize: 22, color: TEXTO, bold: true
      });

      // 4 cards de stats
      const stats = [
        { lbl: 'Demandas\nPendentes', val: String(pend), cor: VERM },
        { lbl: 'Demandas\nConcluídas', val: String(conc), cor: VERDE },
        { lbl: 'Total de\nDemandas', val: String(todas.length), cor: AZUL },
        { lbl: 'Progresso\nGeral', val: pct + '%', cor: AMAR },
      ];

      stats.forEach((st, i) => {
        const x = 0.4 + i * 2.35;
        s.addShape(pres.shapes.RECTANGLE, {
          x, y: 1.55, w: 2.1, h: 1.8,
          fill: { color: CINZA },
          shadow: { type: 'outer', blur: 6, offset: 2, angle: 135, color: '000000', opacity: 0.08 }
        });
        s.addShape(pres.shapes.RECTANGLE, { x, y: 1.55, w: 2.1, h: 0.06, fill: { color: st.cor } });
        s.addText(st.val, { x, y: 1.7, w: 2.1, h: 0.8, fontSize: 36, color: st.cor, bold: true, align: 'center' });
        s.addText(st.lbl, { x, y: 2.55, w: 2.1, h: 0.6, fontSize: 10, color: MUTED, align: 'center' });
      });

      // Laudos resumo
      const laudosConc = (c.laudos||[]).filter(l => l.status === 'Concluído').length;
      s.addText('Laudos Técnicos: ' + laudosConc + ' concluído(s) de ' + (c.laudos||[]).length, {
        x: 0.5, y: 3.6, w: 9, h: 0.4,
        fontSize: 13, color: TEXTO
      });

      // Observação antena
      s.addShape(pres.shapes.RECTANGLE, { x: 0.5, y: 4.1, w: 9, h: 0.9, fill: { color: 'FFF9ED' } });
      s.addText('⚠  Atenção: Problemas com antena coletiva concentrados no Bloco 4, do 5º andar para baixo.', {
        x: 0.6, y: 4.15, w: 8.8, h: 0.8,
        fontSize: 11, color: AMAR
      });
    }

    // ── SLIDE 3: PRIORIDADES ──────────────────────────────────────────────────
    if (c.prioridades && c.prioridades.length) {
      const s = pres.addSlide();
      s.background = { color: BRANCO };

      s.addText('PRIORIDADES', {
        x: 0.5, y: 0.35, w: 9, h: 0.4,
        fontSize: 11, color: AZUL, bold: true, charSpacing: 4
      });
      s.addText('6 itens classificados como urgentes pelo síndico ' + c.sindico, {
        x: 0.5, y: 0.75, w: 9, h: 0.45,
        fontSize: 18, color: TEXTO, bold: true
      });

      const rows = c.prioridades.map(p => {
        const corStatus = p.status === 'Concluído' ? VERDE : p.status === 'Em andamento' ? AMAR : VERM;
        const corPrio   = p.prio === 'Alta' ? VERM : p.prio === 'Média' ? AMAR : VERDE;
        return [
          { text: String(p.num), options: { bold: true, align: 'center', color: TEXTO } },
          { text: p.titulo, options: { bold: true, color: TEXTO } },
          { text: p.prio, options: { bold: true, color: corPrio } },
          { text: p.status, options: { bold: true, color: corStatus } },
          { text: p.resp, options: { color: MUTED } },
        ];
      });

      s.addTable(
        [
          [
            { text: '#',          options: { bold: true, color: BRANCO, fill: { color: AZUL_ESC } } },
            { text: 'Demanda',    options: { bold: true, color: BRANCO, fill: { color: AZUL_ESC } } },
            { text: 'Prioridade', options: { bold: true, color: BRANCO, fill: { color: AZUL_ESC } } },
            { text: 'Status',     options: { bold: true, color: BRANCO, fill: { color: AZUL_ESC } } },
            { text: 'Responsável',options: { bold: true, color: BRANCO, fill: { color: AZUL_ESC } } },
          ],
          ...rows
        ],
        { x: 0.5, y: 1.35, w: 9, colW: [0.4, 3.5, 1.2, 1.5, 2.4], fontSize: 11, border: { pt: 0.5, color: 'E2E8F0' } }
      );
    }

    // ── SLIDES 4+: DETALHES POR PRIORIDADE ────────────────────────────────────
    (c.prioridades || []).forEach((p) => {
      const s = pres.addSlide();
      s.background = { color: BRANCO };

      const corBorda = p.prio === 'Alta' ? VERM : p.prio === 'Média' ? AMAR : VERDE;
      const corStatus = p.status === 'Concluído' ? VERDE : p.status === 'Em andamento' ? AMAR : VERM;

      s.addShape(pres.shapes.RECTANGLE, { x: 0, y: 0, w: 10, h: 0.06, fill: { color: corBorda } });

      s.addText('PRIORIDADE ' + p.num, {
        x: 0.5, y: 0.25, w: 9, h: 0.35,
        fontSize: 10, color: corBorda, bold: true, charSpacing: 3
      });
      s.addText(p.titulo, {
        x: 0.5, y: 0.6, w: 9, h: 0.65,
        fontSize: 20, color: TEXTO, bold: true
      });

      // Status badge
      s.addShape(pres.shapes.RECTANGLE, { x: 0.5, y: 1.35, w: 1.6, h: 0.35, fill: { color: corStatus + '22' } });
      s.addText(p.status, { x: 0.5, y: 1.35, w: 1.6, h: 0.35, fontSize: 11, color: corStatus, bold: true, align: 'center' });

      // Situação
      s.addText('SITUAÇÃO IDENTIFICADA', { x: 0.5, y: 1.9, w: 9, h: 0.3, fontSize: 9, color: MUTED, bold: true, charSpacing: 2 });
      s.addText(p.sit, { x: 0.5, y: 2.2, w: 9, h: 0.8, fontSize: 13, color: TEXTO });

      // Ação
      s.addText('AÇÃO DEFINIDA', { x: 0.5, y: 3.1, w: 4.3, h: 0.3, fontSize: 9, color: MUTED, bold: true, charSpacing: 2 });
      s.addText(p.acao, { x: 0.5, y: 3.4, w: 4.3, h: 0.9, fontSize: 12, color: TEXTO });

      // Métrica
      s.addText('MÉTRICA DE CONCLUSÃO', { x: 5.2, y: 3.1, w: 4.3, h: 0.3, fontSize: 9, color: MUTED, bold: true, charSpacing: 2 });
      s.addText(p.metrica, { x: 5.2, y: 3.4, w: 4.3, h: 0.9, fontSize: 12, color: TEXTO });

      // Rodapé
      s.addShape(pres.shapes.RECTANGLE, { x: 0, y: 5.2, w: 10, h: 0.425, fill: { color: CINZA } });
      s.addText('Responsável: ' + p.resp + '   |   Prazo: ' + p.prazo, {
        x: 0.5, y: 5.2, w: 9, h: 0.425,
        fontSize: 11, color: MUTED, valign: 'middle'
      });
    });

    // ── SLIDE: TODAS AS DEMANDAS ──────────────────────────────────────────────
    if (c.demandas && c.demandas.length) {
      // Quebra em páginas de 8 demandas
      const pageSize = 8;
      for (let pi = 0; pi < c.demandas.length; pi += pageSize) {
        const chunk = c.demandas.slice(pi, pi + pageSize);
        const s = pres.addSlide();
        s.background = { color: BRANCO };

        s.addText('TODAS AS DEMANDAS', {
          x: 0.5, y: 0.35, w: 9, h: 0.4,
          fontSize: 11, color: AZUL, bold: true, charSpacing: 4
        });
        s.addText('Itens levantados em reunião — ' + c.criadoEm + (c.demandas.length > pageSize ? '  (pág. ' + (Math.floor(pi/pageSize)+1) + ')' : ''), {
          x: 0.5, y: 0.75, w: 9, h: 0.4,
          fontSize: 14, color: TEXTO, bold: true
        });

        const rows = chunk.map(d => {
          const corStatus = d.status === 'Concluído' ? VERDE : d.status === 'Em andamento' ? AMAR : VERM;
          const corPrio   = d.prio === 'Alta' ? VERM : d.prio === 'Média' ? AMAR : VERDE;
          return [
            { text: String(d.num), options: { bold: true, align: 'center' } },
            { text: d.titulo, options: { bold: true, color: TEXTO } },
            { text: d.prio, options: { bold: true, color: corPrio } },
            { text: d.status, options: { bold: true, color: corStatus } },
            { text: d.resp, options: { color: MUTED, fontSize: 10 } },
          ];
        });

        s.addTable(
          [
            [
              { text: '#',          options: { bold: true, color: BRANCO, fill: { color: AZUL_ESC } } },
              { text: 'Demanda',    options: { bold: true, color: BRANCO, fill: { color: AZUL_ESC } } },
              { text: 'Prioridade', options: { bold: true, color: BRANCO, fill: { color: AZUL_ESC } } },
              { text: 'Status',     options: { bold: true, color: BRANCO, fill: { color: AZUL_ESC } } },
              { text: 'Responsável',options: { bold: true, color: BRANCO, fill: { color: AZUL_ESC } } },
            ],
            ...rows
          ],
          { x: 0.5, y: 1.3, w: 9, colW: [0.4, 3.8, 1.2, 1.5, 2.1], fontSize: 11, border: { pt: 0.5, color: 'E2E8F0' } }
        );
      }
    }

    // ── SLIDE: LAUDOS ─────────────────────────────────────────────────────────
    if (c.laudos && c.laudos.length) {
      const s = pres.addSlide();
      s.background = { color: BRANCO };

      s.addText('LAUDOS TÉCNICOS', {
        x: 0.5, y: 0.35, w: 9, h: 0.4,
        fontSize: 11, color: AZUL, bold: true, charSpacing: 4
      });
      s.addText('Documentação técnica formal', {
        x: 0.5, y: 0.75, w: 9, h: 0.4,
        fontSize: 18, color: TEXTO, bold: true
      });

      c.laudos.forEach((l, i) => {
        const corStatus = l.status === 'Concluído' ? VERDE : l.status === 'Em andamento' ? AMAR : VERM;
        const y = 1.35 + i * 0.95;
        s.addShape(pres.shapes.RECTANGLE, { x: 0.5, y, w: 9, h: 0.82, fill: { color: CINZA } });
        s.addShape(pres.shapes.RECTANGLE, { x: 0.5, y, w: 0.07, h: 0.82, fill: { color: corStatus } });
        s.addText(l.nome, { x: 0.75, y: y + 0.05, w: 5, h: 0.35, fontSize: 12, color: TEXTO, bold: true });
        s.addText(l.status + '  ·  ' + l.tecnico + '  ·  Vistoria: ' + l.dataVistoria + '  ·  Laudo: ' + l.dataLaudo, {
          x: 0.75, y: y + 0.42, w: 7, h: 0.3, fontSize: 10, color: MUTED
        });
        const envTxt = l.enviado ? '✓ Enviado' : 'Não enviado';
        const envCor = l.enviado ? VERDE : VERM;
        s.addText(envTxt, { x: 8.2, y: y + 0.2, w: 1.2, h: 0.4, fontSize: 10, color: envCor, bold: true, align: 'center' });
        // Nota PDF
        if (l.pdfData) {
          s.addText('📎 PDF anexado: ' + (l.pdfNome || 'laudo.pdf'), {
            x: 0.75, y: y + 0.55, w: 6, h: 0.25, fontSize: 9, color: VERDE
          });
        }
      });
    }

    // ── SLIDE: HISTÓRICO ──────────────────────────────────────────────────────
    if (c.historico && c.historico.length) {
      const s = pres.addSlide();
      s.background = { color: BRANCO };

      s.addText('HISTÓRICO DE ATIVIDADES', {
        x: 0.5, y: 0.35, w: 9, h: 0.4,
        fontSize: 11, color: AZUL, bold: true, charSpacing: 4
      });
      s.addText('Registro cronológico de execuções', {
        x: 0.5, y: 0.75, w: 9, h: 0.4,
        fontSize: 18, color: TEXTO, bold: true
      });

      c.historico.forEach((h, i) => {
        if (i > 5) return; // máx 6 por slide
        const cor = h.cor === 'g' ? VERDE : h.cor === 'a' ? AMAR : AZUL;
        const y = 1.35 + i * 0.7;
        s.addShape(pres.shapes.OVAL, { x: 0.5, y: y + 0.1, w: 0.15, h: 0.15, fill: { color: cor } });
        s.addShape(pres.shapes.LINE, { x: 0.57, y: y + 0.25, w: 0, h: 0.45, line: { color: 'E2E8F0', width: 1.5 } });
        s.addText(h.data, { x: 0.8, y, w: 1.5, h: 0.3, fontSize: 10, color: MUTED, bold: true });
        s.addText(h.txt, { x: 0.8, y: y + 0.25, w: 8.7, h: 0.38, fontSize: 11, color: TEXTO });
      });
    }

    // ── SLIDE FINAL: ASSINATURA ───────────────────────────────────────────────
    {
      const s = pres.addSlide();
      s.background = { color: AZUL_ESC };

      s.addShape(pres.shapes.RECTANGLE, { x: 0, y: 0, w: 0.18, h: 5.625, fill: { color: AZUL } });

      s.addText('CONFIRMAÇÃO DE RECEBIMENTO', {
        x: 0.5, y: 0.8, w: 9, h: 0.4,
        fontSize: 11, color: AZUL, bold: true, charSpacing: 4
      });
      s.addText('Plano de Ação — ' + c.nome, {
        x: 0.5, y: 1.2, w: 9, h: 0.7,
        fontSize: 24, color: BRANCO, bold: true
      });

      s.addText('Eu, síndico(a) do ' + c.nome + ', declaro ter recebido e tomado ciência\ndeste Plano de Ação e dos itens nele descritos.', {
        x: 0.5, y: 2.1, w: 9, h: 0.8,
        fontSize: 14, color: 'B0BEC5'
      });

      // Linha assinatura
      s.addShape(pres.shapes.LINE, { x: 1, y: 3.8, w: 4, h: 0, line: { color: BRANCO, width: 1 } });
      s.addText('Assinatura do Síndico — ' + c.sindico, { x: 1, y: 3.85, w: 4, h: 0.3, fontSize: 10, color: MUTED });

      // Linha data
      s.addShape(pres.shapes.LINE, { x: 6, y: 3.8, w: 3, h: 0, line: { color: BRANCO, width: 1 } });
      s.addText('Data', { x: 6, y: 3.85, w: 3, h: 0.3, fontSize: 10, color: MUTED });

      s.addText('Virtual Service  ·  Condomínio Service  ·  Gerado em ' + hoje, {
        x: 0.5, y: 5.1, w: 9, h: 0.3,
        fontSize: 10, color: MUTED
      });
    }

    // SALVAR
    const nomeArquivo = 'PlanoAcao_' + c.nome.replace(/\s+/g, '_') + '_' + hoje.replace(/\//g, '-') + '.pptx';
    await pres.writeFile({ fileName: nomeArquivo });

  } catch(err) {
    alert('Erro ao gerar apresentação: ' + err.message);
    console.error(err);
  }

  btn.disabled = false;
  btn.textContent = '📊 Gerar Apresentação';
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

document.getElementById('top-data').textContent = new Date().toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });
document.getElementById('footer-data').textContent = 'Última atualização: ' + new Date().toLocaleDateString('pt-BR');

renderSidebar();

// Seleciona Camarás automaticamente
selecionarCond('camaras');

</script>
</body>
</html>
